<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Cache-Control" content="no-cache">

        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="mobile-web-app-capable" content="yes">

        <title>WebGL Fluid Simulation</title>

        <script type="text/javascript" src="dat.gui.min.js"></script>
        <style>
            * {
                user-select: none;
            }

            html, body {
                overflow: hidden;
                background-color: #080f28;
            }

            body {
                margin: 0;
                position: fixed;
                width: 100%;
                height: 100%;
            }

            canvas {
                width: 100%;
                height: 100%;
            }

            .dg {
                opacity: 0.9;
            }

            .dg .property-name {
                overflow: visible;
            }

            .bigFont {
                font-size: 150%;
                color: #8C8C8C;
            }

            .cr.function.appBigFont {
                font-size: 150%;
                line-height: 27px;
                color: #A5F8D3;
                background-color: #023C40;
            }

            .cr.function.appBigFont .property-name {
                float: none;
            }

            #camera-hud {
                position: fixed;
                top: 8px;
                right: 312px;
                background: rgba(0, 0, 0, 0.55);
                color: #b8d4f0;
                font-family: 'Courier New', monospace;
                font-size: 12px;
                line-height: 1.7;
                padding: 6px 10px;
                border-radius: 4px;
                pointer-events: none;
                z-index: 998;
                white-space: pre;
            }

            .hud-label {
                display: inline-block;
                width: 28px;
                color: #6ab0e8;
            }
        </style>
    </head>
    <body>
        <canvas></canvas>

        <div id="camera-hud">
            <div class="hud-row"><span class="hud-label">Eye</span><span id="hud-eye"></span></div>
            <div class="hud-row"><span class="hud-label">Ctr</span><span id="hud-ctr"></span></div>
            <div class="hud-row" id="hud-angles"></div>
        </div>

        <script src="./config.js"></script>
        <script src="./utils.js"></script>
        <script src="./webgl-utils.js"></script>
        <script src="./shaders.js"></script>
        <script src="./passes/divergence.js"></script>
        <script src="./passes/curl.js"></script>
        <script src="./passes/pressure.js"></script>
        <script src="./passes/advection.js"></script>
        <script src="./passes/buoyancy.js"></script>
        <script src="./passes/emitter.js"></script>
        <script src="./passes/splat.js"></script>
        <script src="./passes/render.js"></script>
        <script src="./simulation.js"></script>
        <script src="./gui.js"></script>
        <script src="./model.js"></script>
        <script src="./script.js"></script>
        <script src="./input.js"></script>
        <!-- <script src="./particles.js"></script> -->

    </body>
</html>
