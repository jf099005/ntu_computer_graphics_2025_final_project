<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Cache-Control" content="no-cache">

        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="mobile-web-app-capable" content="yes">

        <title>WebGL Fluid Simulation</title>

        <style>
            * {
                user-select: none;
            }

            html, body {
                overflow: hidden;
                background: radial-gradient(circle at top, rgba(111, 177, 255, 0.18), transparent 30%),
                            linear-gradient(180deg, #09182d 0%, #07111f 50%, #050711 100%);
            }

            body {
                margin: 0;
                position: fixed;
                width: 100%;
                height: 100%;
            }

            canvas {
                width: 100%;
                height: 100%;
                background: transparent;
            }

            #camera-hud {
                position: fixed;
                top: 8px;
                right: 8px;
                background: rgba(0, 0, 0, 0.55);
                color: #b8d4f0;
                font-family: 'Courier New', monospace;
                font-size: 12px;
                line-height: 1.7;
                padding: 6px 10px;
                border-radius: 4px;
                pointer-events: none;
                z-index: 998;
                white-space: pre;
            }

            .hud-label {
                display: inline-block;
                width: 28px;
                color: #6ab0e8;
            }

            #start-overlay {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(5, 10, 25, 0.82);
                backdrop-filter: blur(4px);
                z-index: 9999;
                cursor: pointer;
                transition: opacity 0.4s ease;
            }

            #start-overlay.hidden {
                opacity: 0;
                pointer-events: none;
            }

            #start-panel {
                text-align: center;
                color: #c8dff5;
                font-family: 'Courier New', monospace;
                pointer-events: none;
            }

            #start-panel h1 {
                margin: 0 0 6px;
                font-size: 28px;
                font-weight: 400;
                letter-spacing: 2px;
                color: #e8f4ff;
            }

            #start-panel .subtitle {
                margin: 0 0 32px;
                font-size: 13px;
                color: #6ab0e8;
                letter-spacing: 1px;
            }

            #start-panel table {
                margin: 0 auto 36px;
                border-collapse: collapse;
            }

            #start-panel td {
                padding: 6px 16px;
                font-size: 14px;
                line-height: 1.5;
                text-align: left;
            }

            #start-panel td.key {
                text-align: right;
                color: #a8d0f0;
                font-weight: bold;
                background: rgba(255,255,255,0.05);
                border-radius: 4px;
                letter-spacing: 1px;
                padding-right: 20px;
            }
            
            #hotbar {
                position: fixed;
                left: 50%;
                bottom: 28px;
                transform: translateX(-50%);
                display: flex;
                gap: 8px;
                z-index: 1000;
                pointer-events: none;
            }

            .slot {
                width: 58px;
                height: 58px;
                border: 3px solid rgba(255, 255, 255, 0.35);
                background: rgba(20, 20, 20, 0.65);
                box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.45);
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
            }

            .slot.selected {
                border-color: #ffffff;
                background: rgba(255, 255, 255, 0.18);
                box-shadow:
                    0 0 12px rgba(255, 255, 255, 0.65),
                    inset 0 0 0 2px rgba(0, 0, 0, 0.45);
                transform: translateY(-4px);
            }

            .swatch {
                width: 34px;
                height: 34px;
                border-radius: 6px;
                border: 2px solid rgba(0, 0, 0, 0.5);
            }

            .swatch.white {
                background: #dddddd;
            }

            .swatch.red {
                background: #ff3030;
            }

            .swatch.blue {
                background: #2f5cff;
            }

            .swatch.green {
                background: #35d15a;
            }

            .label {
                position: absolute;
                left: 5px;
                top: 3px;
                font-size: 13px;
                color: white;
                font-family: monospace;
                text-shadow: 1px 1px 2px black;
            }

            #weapon-name {
                position: fixed;
                left: 50%;
                bottom: 98px;
                transform: translateX(-50%);
                color: white;
                font-family: monospace;
                font-size: 18px;
                text-shadow: 2px 2px 4px black;
                z-index: 1000;
                pointer-events: none;
            }

        </style>
    </head>
    <body>
        <canvas></canvas>

        <div id="start-overlay">
            <div id="start-panel">
                <h1>WebGL Fluid Simulation</h1>
                <p class="subtitle">操作說明</p>
                <table>
                    <tr>
                        <td class="key">滑鼠左鍵</td>
                        <td>進入視角 / 投擲方塊</td>
                    </tr>
                    <tr>
                        <td class="key">W / S</td>
                        <td>前進 / 後退</td>
                    </tr>
                    <tr>
                        <td class="key">A / D</td>
                        <td>向左 / 向右移動</td>
                    </tr>
                    <tr>
                        <td class="key">Space</td>
                        <td>向上移動</td>
                    </tr>
                    <tr>
                        <td class="key">Ctrl</td>
                        <td>向下移動</td>
                    </tr>
                    <tr>
                        <td class="key">滑鼠移動</td>
                        <td>環顧四周（鎖定後）</td>
                    </tr>
                    <tr>
                        <td class="key">P</td>
                        <td>暫停 / 繼續</td>
                    </tr>
                </table>
            </div>
        </div>
        <div id="hotbar">
            <div class="slot selected" data-type="white">
                <div class="swatch white"></div>
                <div class="label">1</div>
            </div>

            <div class="slot" data-type="red">
                <div class="swatch red"></div>
                <div class="label">2</div>
            </div>

            <div class="slot" data-type="blue">
                <div class="swatch blue"></div>
                <div class="label">3</div>
            </div>

            <div class="slot" data-type="green">
                <div class="swatch green"></div>
                <div class="label">4</div>
            </div>
        </div>

        <div id="weapon-name">White smoke grenade</div>

        <div id="camera-hud">
            <div class="hud-row"><span class="hud-label">X</span><span id="hud-cx"></span></div>
            <div class="hud-row"><span class="hud-label">Y</span><span id="hud-cy"></span></div>
            <div class="hud-row"><span class="hud-label">Z</span><span id="hud-cz"></span></div>
            <div class="hud-row" id="hud-angles"></div>
            <div class="hud-row"><span class="hud-label">Fwd</span><span id="hud-fwd"></span></div>
        </div>

        <script src="./config.js"></script>
        <script src="./utils.js"></script>
        <script src="./webgl-utils.js"></script>
        <script src="./shaders.js"></script>
        <script src="./passes/divergence.js"></script>
        <script src="./passes/curl.js"></script>
        <script src="./passes/pressure.js"></script>
        <script src="./passes/advection.js"></script>
        <script src="./passes/buoyancy.js"></script>
        <script src="./passes/emitter.js"></script>
        <script src="./passes/splat.js"></script>
        <script src="./passes/render.js"></script>
        <script src="./simulation.js"></script>
        <script src="./gui.js"></script>
        <script src="./model.js"></script>
        <script src="./script.js"></script>
        <script src="./input.js"></script>
        <!-- <script src="./particles.js"></script> -->

        <script>
            (function () {
                const overlay = document.getElementById('start-overlay');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    setTimeout(() => overlay.remove(), 450);
                }, 3000);
            })();
        </script>

    </body>
</html>
